<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f24" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Title -->
    <title>EazyMarkets | Premium Forex & CFD Trading Platform</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Trade forex, CFDs, commodities, indices, and more with EazyMarkets. Explore smart trading tools, market access, and a premium online trading experience."
    />
    <meta
      name="keywords"
      content="EazyMarkets, forex trading, CFD trading, online trading, commodities trading, indices trading, smart trading platform, financial markets"
    />
    <meta name="author" content="EazyMarkets" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://eazymarkets.com/" />

    <!-- Favicon / Branding -->
    <link rel="icon" type="image/jpeg" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EazyMarkets" />
    <meta property="og:title" content="EazyMarkets | Premium Forex & CFD Trading Platform" />
    <meta
      property="og:description"
      content="Trade forex, CFDs, commodities, indices, and more with EazyMarkets. Discover a premium trading platform built for modern traders."
    />
    <meta property="og:url" content="https://eazymarkets.com/" />
    <meta property="og:image" content="https://eazymarkets.com/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EazyMarkets | Premium Forex & CFD Trading Platform" />
    <meta
      name="twitter:description"
      content="Trade forex, CFDs, commodities, indices, and more with EazyMarkets using a premium online trading platform."
    />
    <meta name="twitter:image" content="https://eazymarkets.com/logo.png" />

    <!-- Fonts -->
